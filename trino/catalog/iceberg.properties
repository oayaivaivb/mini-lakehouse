connector.name=iceberg

# Имя каталога и корневой путь к хранилищу данных
iceberg.jdbc-catalog.catalog-name=iceberg
iceberg.jdbc-catalog.default-warehouse-dir=s3://iceberg/

# Настройка JDBC-подключения к метакаталогу в PostgreSQL
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/iceberg_catalog
iceberg.jdbc-catalog.connection-user=iceberg_user
iceberg.jdbc-catalog.connection-password=iceberg_password

# Активация нативного S3-клиента
fs.s3.enabled=true

# Параметры S3 и обязательный РЕГИОН для AWS SDK внутри Trino
s3.aws-access-key=minio_admin
s3.aws-secret-key=minio_password
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true